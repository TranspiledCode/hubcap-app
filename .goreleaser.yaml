version: 2

project_name: hubcap

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    main: .
    binary: hubcap
    ldflags:
      - -s -w

archives:
  - format: tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^chore:"
      - "^docs:"
      - "^test:"

brews:
  - name: hubcap
    repository:
      owner: TranspiledCode
      name: homebrew-tap
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/TranspiledCode/hubcap-app"
    description: "GitHub in your terminal — browse issues and PRs, check CI, merge, and act with keyboard shortcuts"
    license: "AGPL-3.0-only"
    dependencies:
      - name: gh
    install: |
      bin.install "hubcap"
